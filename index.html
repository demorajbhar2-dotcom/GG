<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kkoyal | Elegant Women's Wear</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{background:#fafafa;color:#333;}
a{text-decoration:none;color:inherit;}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.logo{font-size:24px;font-weight:bold;}
nav a{margin-left:20px;font-size:14px;}
.cart-btn{cursor:pointer;font-weight:bold;}

.hero{
position:relative;
height:80vh;
overflow:hidden;
}
.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(80%);
}
.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}
.hero-text h1{font-size:48px;margin-bottom:10px;}
.hero-text button{
padding:12px 30px;
border:none;
background:#000;
color:white;
cursor:pointer;
}

.section{
padding:60px 40px;
text-align:center;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}
.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
transition:0.3s;
}
.card:hover{transform:translateY(-5px);}
.card img{width:100%;border-radius:8px;}
.card h3{margin:15px 0 5px;}
.card button{
margin-top:10px;
padding:8px 15px;
border:none;
background:black;
color:white;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:2000;
}
.modal-content{
background:white;
width:90%;
max-width:500px;
padding:20px;
border-radius:10px;
}
.close{float:right;cursor:pointer;font-weight:bold;}
.modal img{width:100%;margin:15px 0;}
.size-select button{
margin:5px;
padding:5px 10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.1);
padding:20px;
transition:0.3s;
z-index:3000;
overflow:auto;
}
.cart.active{right:0;}
.cart h2{margin-bottom:20px;}
.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}
.cart-item button{
border:none;
background:red;
color:white;
padding:2px 6px;
cursor:pointer;
}

.checkout{
margin-top:20px;
}
.checkout button{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}

@media(max-width:768px){
.hero-text h1{font-size:30px;}
}
</style>
</head>

<body>

<header>
<div class="logo">Kkoyal</div>
<nav>
<a href="#">Home</a>
<a href="#products">Shop</a>
<a onclick="toggleCart()" class="cart-btn">Cart (<span id="cart-count">0</span>)</a>
</nav>
</header>

<section class="hero">
<img src="https://i.ibb.co/mVC6VzFz/file-000000001738720b86c5ece1368cb9b3.png">
<div class="hero-text">
<h1>Elegance Meets Everyday Style</h1>
<button onclick="scrollToProducts()">Shop Now</button>
</div>
</section>

<section class="section" id="products">
<h2>Featured Collection</h2>

<div class="products">

<div class="card">
<img src="https://i.ibb.co/4g48Z4sr/IMG-20260108-124647.png">
<h3>Elegant Ethnic Dress</h3>
<p>₹1899</p>
<button onclick="openModal('Elegant Ethnic Dress',1899,'https://i.ibb.co/4g48Z4sr/IMG-20260108-124647.png')">Quick View</button>
</div>

<div class="card">
<img src="https://i.ibb.co/0Vq8n4jY/IMG-20260108-125314.png">
<h3>Modern Designer Kurta</h3>
<p>₹1799</p>
<button onclick="openModal('Modern Designer Kurta',1799,'https://i.ibb.co/0Vq8n4jY/IMG-20260108-125314.png')">Quick View</button>
</div>

</div>
</section>

<div class="modal" id="productModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<h2 id="modal-title"></h2>
<img id="modal-img">
<p id="modal-price"></p>

<div class="size-select">
<p>Select Size:</p>
<button onclick="selectSize(this)">S</button>
<button onclick="selectSize(this)">M</button>
<button onclick="selectSize(this)">L</button>
<button onclick="selectSize(this)">XL</button>
</div>

<button style="margin-top:15px;width:100%;padding:10px;background:black;color:white;border:none;"
onclick="addToCart()">Add to Cart</button>
</div>
</div>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cart-items"></div>
<h3>Total: ₹<span id="total">0</span></h3>
<div class="checkout">
<button onclick="checkout()">Checkout</button>
</div>
</div>

<footer>
<p>© 2026 Kkoyal. All Rights Reserved.</p>
</footer>

<script>
let cart=[];
let selectedProduct={};
let selectedSize="";

function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

function openModal(title,price,img){
selectedProduct={title,price,img};
document.getElementById("modal-title").innerText=title;
document.getElementById("modal-price").innerText="₹"+price;
document.getElementById("modal-img").src=img;
document.getElementById("productModal").style.display="flex";
}

function closeModal(){
document.getElementById("productModal").style.display="none";
}

function selectSize(btn){
selectedSize=btn.innerText;
document.querySelectorAll(".size-select button").forEach(b=>b.style.background="white");
btn.style.background="#ddd";
}

function addToCart(){
if(!selectedSize){alert("Please select size");return;}
cart.push({...selectedProduct,size:selectedSize});
updateCart();
closeModal();
}

function updateCart(){
let cartItems=document.getElementById("cart-items");
cartItems.innerHTML="";
let total=0;
cart.forEach((item,index)=>{
total+=item.price;
cartItems.innerHTML+=`
<div class="cart-item">
<span>${item.title} (${item.size}) - ₹${item.price}</span>
<button onclick="removeItem(${index})">X</button>
</div>`;
});
document.getElementById("total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;
}

function removeItem(index){
cart.splice(index,1);
updateCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function checkout(){
if(cart.length===0){alert("Cart is empty");return;}
alert("Order Placed Successfully!");
cart=[];
updateCart();
toggleCart();
}
</script>

</body>
</html>
